<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Упражнение 4</title>
  <style>
    :root{
      --bg:#e3f2fd;
      --card:#ffffff;
      --text:#1f2937;
      --muted:#6b7280;
      --accent:#3478E0;
      --accent-dark:#1f5fc8;
      --ok:#4CAF50;
      --bad:#f44336;
      --field:#f5f9ff;
      --shadow:0 2px 10px rgba(0,0,0,.08);
      --radius:14px;
    }

    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
      background:var(--bg);
      min-height:100vh;
      padding:16px;
      color:var(--text);
    }

    .container{max-width:860px;margin:0 auto}
    .header{text-align:center;margin:8px 0 14px}
    .header h1{font-size:1.6rem;line-height:1.15;color:var(--accent);margin-bottom:6px}

    .instructions{
      background:var(--card);
      border-radius:var(--radius);
      padding:14px 16px;
      box-shadow:var(--shadow);
      font-size:.95rem;
      line-height:1.45;
      color:#374151;
      margin-bottom:12px;
    }

    .list{display:flex;flex-direction:column;gap:12px;margin-bottom:14px}

    .item{
      background:var(--card);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:14px;
      border:2px solid transparent;
      transition:border-color .15s ease, background .15s ease;
    }
    .item.correct{border-color:rgba(76,175,80,.55);background:#e8f5e9}
    .item.incorrect{border-color:rgba(244,67,54,.55);background:#ffebee}

    .row{
      display:grid;
      grid-template-columns: 34px 1fr;
      gap:10px;
      align-items:start;
    }

    .num{
      width:34px;height:34px;
      display:flex;align-items:center;justify-content:center;
      border-radius:10px;
      background:rgba(52,120,224,.12);
      color:var(--accent);
      font-weight:800;
    }

    .prompt{
      font-weight:800;
      color:var(--accent);
      font-size:1.02rem;
      line-height:1.25;
      margin-top:6px;
    }

    .answerWrap{margin-top:10px}

    .answerInput{
      width:100%;
      border:2px solid #bbdefb;
      background:var(--field);
      color:var(--text);
      border-radius:12px;
      padding:10px 12px;
      font-size:1.05rem;
      line-height:1.25;
      outline:none;
      min-height:46px;
      resize:none;
      overflow:hidden;
      transition:border-color .15s ease, box-shadow .15s ease, background .15s ease;
    }
    .answerInput:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(52,120,224,.14)}

    .answerInput.good{border-color:rgba(76,175,80,.9);background:#ffffff}
    .answerInput.bad{border-color:rgba(244,67,54,.9);background:#ffffff}

    .controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:10px}

    .checkBtn{
      border:none;
      background:var(--accent);
      color:#fff;
      padding:10px 14px;
      border-radius:12px;
      cursor:pointer;
      font-size:.98rem;
      font-weight:900;
      transition:background .15s ease, transform .05s ease;
      white-space:nowrap;
    }
    .checkBtn:hover{background:var(--accent-dark)}
    .checkBtn:active{transform:translateY(1px)}

    .status{
      font-size:.95rem;
      color:#374151;
      min-height:1.2em;
    }
    .status .ok{color:var(--ok);font-weight:800}
    .status .bad{color:var(--bad);font-weight:800}

    .hint{
      display:none;
      margin-top:8px;
      font-size:.95rem;
      color:#991b1b;
      background:rgba(244,67,54,.08);
      border:1px solid rgba(244,67,54,.35);
      border-radius:12px;
      padding:8px 10px;
      line-height:1.35;
    }
    .hint.show{display:block}

    /* предупреждения: правильный ответ, но есть оговорка */
    .hint.warn{
      color:#92400e;
      background:rgba(245,158,11,.12);
      border:1px solid rgba(245,158,11,.55);
    }

    .footerCard{
      background:var(--card);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:14px;
    }

    .footerRow{display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:space-between}

    .resetBtn{
      border:none;
      background:rgba(52,120,224,.12);
      color:var(--accent);
      padding:10px 14px;
      border-radius:12px;
      cursor:pointer;
      font-size:.98rem;
      font-weight:900;
      transition:background .15s ease, transform .05s ease;
    }
    .resetBtn:hover{background:rgba(52,120,224,.18)}
    .resetBtn:active{transform:translateY(1px)}

    .score{
      font-size:1rem;
      color:#111827;
      font-weight:900;
    }
    .score small{display:block;font-weight:500;color:var(--muted);margin-top:2px}

    .message{
      display:none;
      margin-top:12px;
      padding:14px;
      border-radius:14px;
      background:#f3f6ff;
      border:1px solid rgba(52,120,224,.25);
      color:#1f2937;
      line-height:1.45;
    }
    .message.show{display:block}
    .message .title{font-weight:900;color:var(--accent);margin-bottom:6px}

    @media (max-width: 640px){
      body{padding:12px}
      .footerRow{flex-direction:column;align-items:stretch}
      .resetBtn{width:100%}
      .score{text-align:center}
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Упражнение 4</h1>
    </div>

    <div class="instructions">
      <strong>Переведите предложения на турецкий язык.</strong>
      Регистр не важен, знаки пунктуации <code>. ! ? , ; :</code> игнорируются.
    </div>

    <div class="list" id="list"></div>

    <div class="footerCard">
      <div class="footerRow">
        <button class="resetBtn" id="resetBtn" type="button">Tekrar Dene</button>
        <div class="score" id="score">0 / 7 doğru<small>Можно проверять сколько угодно раз.</small></div>
      </div>

      <div class="message" id="message">
        <div class="title" id="messageTitle"></div>
        <div id="messageBody"></div>
      </div>
    </div>
  </div>

  <script>
    const DATA = [
      {
        ru: 'У нас достаточно времени, чтобы закончить этот проект.',
        answers: [
          'Bizim bu projeyi bitirmek için yeterince zamanımız var',
          'Bu projeyi bitirmek için yeterince zamanımız var',
          'Bizim bu projeyi bitirmek için yeterince vaktimiz var',
          'Bu projeyi bitirmek için yeterince vaktimiz var',
          'Bizim bu projeyi bitirmemiz için yeterince zamanımız var',
          'Bu projeyi bitirmemiz için yeterince zamanımız var',
          'Bizim bu projeyi bitirmemiz için yeterince vaktimiz var',
          'Bu projeyi bitirmemiz için yeterince vaktimiz var',
        ],
      },
      {
        ru: 'У меня сейчас нет времени на такие вещи.',
        answers: [
          'Benim şu anda böyle şeylere ayıracak vaktim yok',
          'Şu anda böyle şeylere ayıracak vaktim yok',
          'Benim şu anda böyle şeylere ayıracak zamanım yok',
          'Şu anda böyle şeylere ayıracak zamanım yok',

          'Benim şu anda böyle şeyler için vaktim yok',
          'Şu anda böyle şeyler için vaktim yok',
          'Benim şu anda böyle şeyler için zamanım yok',
          'Şu anda böyle şeyler için zamanım yok',

          'Benim şu anda bu tür şeyler için vaktim yok',
          'Şu anda bu tür şeyler için vaktim yok',
          'Benim şu anda bu tür şeyler için zamanım yok',
          'Şu anda bu tür şeyler için zamanım yok',

          'Benim şu anda bu tarz şeyler için vaktim yok',
          'Şu anda bu tarz şeyler için vaktim yok',
          'Benim şu anda bu tarz şeyler için zamanım yok',
          'Şu anda bu tarz şeyler için zamanım yok',
        ],
      },
      {
        ru: 'У него очень хорошая память.',
        answers: [
          'Onun çok güçlü bir hafızası var',
          'Çok güçlü bir hafızası var',
          'Onun çok iyi bir hafızası var',
          'Çok iyi bir hafızası var',
          'Onun oldukça güçlü bir hafızası var',
          'Oldukça güçlü bir hafızası var',
          'Onun güçlü bir hafızası var',
          'Güçlü bir hafızası var',
          'Onun hafızası çok iyi',
          'Hafızası çok iyi',
        ],
      },
      {
        ru: 'У Севды в этом городе есть множество знакомых.',
        answers: [
          "Sevda'nın bu şehirde birçok tanıdığı var",
          "Bu şehirde Sevda'nın birçok tanıdığı var",
          "Sevda'nın bu şehirde çok tanıdığı var",
          "Bu şehirde Sevda'nın çok tanıdığı var",
          "Sevda'nın bu şehirde epey tanıdığı var",
          "Bu şehirde Sevda'nın epey tanıdığı var",
          "Sevda'nın bu şehirde epeyce tanıdığı var",
          "Bu şehirde Sevda'nın epeyce tanıdığı var",
        ],
      },
      {
        ru: 'У этого плана есть серьёзная проблема.',
        answers: [
          'Bu planın ciddi bir sorunu var',
          'Ciddi bir sorunu var bu planın',
          'Bu planın ciddi bir problemi var',
          'Ciddi bir problemi var bu planın',
          'Bu planın ciddi bir sıkıntısı var',
          'Ciddi bir sıkıntısı var bu planın',
          'Bu planın büyük bir sorunu var',
          'Büyük bir sorunu var bu planın',
          'Bu planın büyük bir problemi var',
          'Büyük bir problemi var bu planın',
          'Bu planın büyük bir sıkıntısı var',
          'Büyük bir sıkıntısı var bu planın',
        ],
      },
      {
        ru: 'У этого студента есть большой потенциал.',
        answers: [
          'Bu öğrencinin büyük bir potansiyeli var',
          'Bu öğrencinin ciddi bir potansiyeli var',
          'Bu öğrencinin yüksek bir potansiyeli var',
          'Bu öğrencinin büyük potansiyeli var',
          'Bu öğrencinin ciddi potansiyeli var',
          'Bu öğrencinin yüksek potansiyeli var',
        ],
      },
      {
        ru: 'Эта история нелогична. (досл. «у этой истории нет логичной стороны»)',
        answers: [
          'Bu hikayenin mantıklı bir tarafı yok',
          'Mantıklı bir tarafı yok bu hikayenin',
          'Bu hikayenin mantıklı bir yönü yok',
          'Mantıklı bir yönü yok bu hikayenin',
          'Bu hikayenin hiçbir mantıklı tarafı yok',
          'Hiçbir mantıklı tarafı yok bu hikayenin',
          'Bu hikayenin hiçbir mantıklı yönü yok',
          'Hiçbir mantıklı yönü yok bu hikayenin',
        ],
      },
    ];

    const state = {
      wasCorrect: Array(DATA.length).fill(false),
      audioCtx: null,
    };

    function ensureAudio(){
      if(!state.audioCtx){
        state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if(state.audioCtx.state === 'suspended') state.audioCtx.resume();
    }

    function beep(freq=880, dur=0.08, gain=0.12){
      ensureAudio();
      const ctx = state.audioCtx;
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'sine';
      o.frequency.value = freq;
      g.gain.setValueAtTime(0.0001, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(gain, ctx.currentTime + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + dur);
      o.connect(g);
      g.connect(ctx.destination);
      o.start();
      o.stop(ctx.currentTime + dur);
    }

    function playCorrect(){
      // приятная двухнота (как в hw2/hw3)
      beep(659, 0.08, 0.12);
      setTimeout(() => beep(880, 0.10, 0.12), 90);
    }

    function playWrong(){
      // короткий «ошибочный» сигнал
      beep(220, 0.12, 0.14);
      setTimeout(() => beep(164, 0.16, 0.14), 120);
    }

    function norm(s){
      return (s ?? '')
        .toString()
        .replace(/[.!?,;:]/g, '')
        .trim()
        .replace(/\s+/g,' ')
        .toLocaleLowerCase('tr-TR');
    }

    function dropBirFromNorm(n){
      return (n ?? '')
        .toString()
        .replace(/\bbir\b/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function answersMatch(v, answers){
      return answers.some(a => norm(a) === v);
    }

    function answersMatchNoBir(v, answers){
      const v2 = dropBirFromNorm(v);
      return answers.some(a => dropBirFromNorm(norm(a)) === v2);
    }

    function answersMatchWithNormReplacement(v, answers, from, to){
      return answers.some(a => {
        const na = norm(a);
        return na.includes(from) && na.replaceAll(from, to) === v;
      });
    }

    function escapeHtml(s){
      return (s ?? '').toString()
        .replaceAll('&','&amp;')
        .replaceAll('<','&lt;')
        .replaceAll('>','&gt;')
        .replaceAll('"','&quot;')
        .replaceAll("'",'&#39;');
    }

    function autosizeTA(ta){
      ta.style.height = 'auto';
      ta.style.height = (ta.scrollHeight) + 'px';
    }

    function render(){
      const list = document.getElementById('list');
      list.innerHTML = '';

      DATA.forEach((it, idx) => {
        const card = document.createElement('div');
        card.className = 'item';
        card.id = 'item-' + idx;

        const row = document.createElement('div');
        row.className = 'row';

        const num = document.createElement('div');
        num.className = 'num';
        num.textContent = String(idx + 1);

        const right = document.createElement('div');

        const prompt = document.createElement('div');
        prompt.className = 'prompt';
        prompt.textContent = it.ru;

        const answerWrap = document.createElement('div');
        answerWrap.className = 'answerWrap';

        const ta = document.createElement('textarea');
        ta.className = 'answerInput';
        ta.id = 'ans-' + idx;
        ta.rows = 1;
        ta.placeholder = 'Введите перевод по-турецки…';
        ta.autocomplete = 'off';
        ta.spellcheck = false;
        ta.setAttribute('aria-label', 'Ответ');

        ta.addEventListener('input', () => autosizeTA(ta));
        ta.addEventListener('focus', () => autosizeTA(ta));
        ta.addEventListener('keydown', (e) => {
          if(e.key === 'Enter' && (e.ctrlKey || e.metaKey)){
            e.preventDefault();
            checkOne(idx);
          }
        });

        const hint = document.createElement('div');
        hint.className = 'hint';
        hint.id = 'hint-' + idx;

        const controls = document.createElement('div');
        controls.className = 'controls';

        const btn = document.createElement('button');
        btn.className = 'checkBtn';
        btn.type = 'button';
        btn.textContent = 'Проверить';
        btn.addEventListener('click', () => checkOne(idx));

        const status = document.createElement('div');
        status.className = 'status';
        status.id = 'status-' + idx;

        controls.appendChild(btn);
        controls.appendChild(status);

        answerWrap.appendChild(ta);
        answerWrap.appendChild(controls);
        answerWrap.appendChild(hint);

        right.appendChild(prompt);
        right.appendChild(answerWrap);

        row.appendChild(num);
        row.appendChild(right);
        card.appendChild(row);
        list.appendChild(card);

        requestAnimationFrame(() => autosizeTA(ta));
      });
    }

    function setHint(idx, show, text){
      const el = document.getElementById('hint-' + idx);
      el.classList.toggle('show', !!show);
      el.classList.toggle('warn', false);
      if(show){
        el.innerHTML = '<strong>Подсказка:</strong> ' + escapeHtml(text);
      } else {
        el.innerHTML = '';
      }
    }

    function setWarn(idx, show, text){
      const el = document.getElementById('hint-' + idx);
      el.classList.toggle('show', !!show);
      el.classList.toggle('warn', !!show);
      if(show){
        el.innerHTML = escapeHtml(text);
      } else {
        el.innerHTML = '';
      }
    }

    function setStatus(idx, ok){
      const el = document.getElementById('status-' + idx);
      if(ok){
        el.innerHTML = '<span class="ok">✅ Правильно</span>';
      } else {
        el.innerHTML = '<span class="bad">❌ Неправильно</span>';
      }
    }

    function markCard(idx, ok){
      const card = document.getElementById('item-' + idx);
      card.classList.remove('correct','incorrect');
      card.classList.add(ok ? 'correct' : 'incorrect');
    }

    function markTA(ta, ok){
      ta.classList.remove('good','bad');
      ta.classList.add(ok ? 'good' : 'bad');
    }

    function updateScoreAndMessage(){
      const score = state.wasCorrect.filter(Boolean).length;
      document.getElementById('score').firstChild.nodeValue = `${score} / ${DATA.length} doğru`;

      const box = document.getElementById('message');
      const title = document.getElementById('messageTitle');
      const body = document.getElementById('messageBody');

      if(score === DATA.length){
        title.textContent = 'Отлично!';
        body.textContent = 'Allah Allah! Да вы просто повелитель аффиксов! Так держать! 🎉';
        box.classList.add('show');
      } else if(score >= 4){
        title.textContent = 'Очень хорошо!';
        body.textContent = 'Bravo! Вы уже неплохо разбираетесь в теме, так держать! 💪';
        box.classList.add('show');
      } else {
        box.classList.remove('show');
        title.textContent = '';
        body.textContent = '';
      }
    }

    function checkOne(idx){
      ensureAudio();

      const it = DATA[idx];
      const ta = document.getElementById('ans-' + idx);
      const v = norm(ta.value);

      let ok = answersMatch(v, it.answers);
      let warnText = '';

      if(!ok){
        // Q1: считаем «yeterli» допустимым вариантом вместо «yeterince», но предупреждаем
        if(idx === 0 && answersMatchWithNormReplacement(v, it.answers, 'yeterince', 'yeterli')){
          ok = true;
          warnText = 'Not: по нашему мнению yeterince в этом предложении звучит лучше, чем yeterli, однако ответ засчитан!';
        }

        // Q2: «şu anda» пишется раздельно, но засчитываем «şuanda»
        if(!ok && idx === 1 && answersMatchWithNormReplacement(v, it.answers, 'şu anda', 'şuanda')){
          ok = true;
          warnText = 'Not: слово şu anda пишется раздельно, но ответ засчитан!';
        }

        // Q3 + Q5: «bir» опционально
        if(!ok && (idx === 2 || idx === 4) && answersMatchNoBir(v, it.answers)){
          ok = true;
        }
      }

      markTA(ta, ok);
      markCard(idx, ok);
      setStatus(idx, ok);

      if(ok){
        if(warnText){
          setWarn(idx, true, warnText);
        } else {
          setHint(idx, false, '');
        }

        if(!state.wasCorrect[idx]) playCorrect();
        state.wasCorrect[idx] = true;
      } else {
        playWrong();
        setHint(idx, true, it.answers[0]);
        state.wasCorrect[idx] = false;
      }

      updateScoreAndMessage();
    }

    function resetAll(){
      state.wasCorrect = Array(DATA.length).fill(false);

      DATA.forEach((_, idx) => {
        const card = document.getElementById('item-' + idx);
        const ta = document.getElementById('ans-' + idx);
        const status = document.getElementById('status-' + idx);

        ta.value = '';
        ta.classList.remove('good','bad');
        autosizeTA(ta);

        card.classList.remove('correct','incorrect');
        status.innerHTML = '';
        setHint(idx, false, '');
      });

      updateScoreAndMessage();
      window.scrollTo({top:0, behavior:'smooth'});
    }

    render();
    updateScoreAndMessage();

    document.getElementById('resetBtn').addEventListener('click', resetAll);

    // Разрешаем «пробуждение» аудио контекста на любое взаимодействие
    ['pointerdown','touchstart','keydown'].forEach(evt => {
      window.addEventListener(evt, () => { try{ ensureAudio(); }catch(e){} }, {once:true, passive:true});
    });
  </script>
</body>
</html>
