<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Задание 5: Послелоги пространства и направления</title>
<style>
:root {
  --bg: #faf5ff;
  --card: #ffffff;
  --text: #1f1833;
  --muted: #7c6f93;
  --accent: #8b5cf6;
  --accent-dark: #7c3aed;
  --accent-light: #ede9fe;
  --ok: #22c55e;
  --ok-bg: #dcfce7;
  --bad: #ef4444;
  --bad-bg: #fee2e2;
  --field: #f3e8ff;
  --shadow: 0 2px 12px rgba(139,92,246,.12);
  --radius: 16px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);min-height:100vh;padding:16px;color:var(--text)}
.container{max-width:720px;margin:0 auto;padding-bottom:40px}
.hero-img{width:100%;max-height:260px;object-fit:cover;border-radius:var(--radius);margin-bottom:20px;box-shadow:var(--shadow)}
.header{text-align:center;margin-bottom:28px}
.header h1{font-size:1.5rem;color:var(--accent-dark);margin-bottom:6px;line-height:1.3}
.header .sub{font-size:.92rem;font-weight:400;color:var(--muted)}
.header p{color:var(--muted);font-size:.9rem;line-height:1.5;max-width:580px;margin:10px auto 0}

/* Sentence cards */
.s-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px 22px;margin-bottom:16px;border-left:4px solid var(--accent);transition:border-color .3s}
.s-card.checked-ok{border-left-color:var(--ok)}
.s-card.checked-bad{border-left-color:var(--bad)}
.s-num{display:inline-block;background:var(--accent);color:#fff;width:28px;height:28px;border-radius:50%;text-align:center;line-height:28px;font-size:.85rem;font-weight:700;margin-right:10px;vertical-align:middle;flex-shrink:0}
.s-text{font-size:1.08rem;line-height:2;display:inline}

/* Blanks */
.blank{display:inline-block;min-width:85px;padding:4px 14px;margin:2px 4px;border-radius:10px;background:var(--field);border:2px dashed var(--accent);cursor:pointer;text-align:center;font-weight:600;color:var(--accent);transition:all .2s;font-size:1rem;vertical-align:middle;position:relative;user-select:none}
.blank:hover{background:var(--accent-light);border-color:var(--accent-dark)}
.blank.filled{border-style:solid;background:var(--accent-light);color:var(--accent-dark)}
.blank.correct{border-color:var(--ok)!important;background:var(--ok-bg)!important;color:#166534!important;cursor:default;border-style:solid}
.blank.wrong{border-color:var(--bad)!important;background:var(--bad-bg)!important;color:#991b1b!important;cursor:default;border-style:solid}
.blank.locked{cursor:default;pointer-events:none}

/* Popup */
.popup{position:absolute;top:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--card);border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,.18);z-index:100;overflow:hidden;min-width:150px;animation:popIn .15s ease-out}
@keyframes popIn{from{opacity:0;transform:translateX(-50%) translateY(-6px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.popup-opt{padding:12px 20px;cursor:pointer;font-size:1rem;font-weight:500;transition:background .1s;text-align:center;border-bottom:1px solid #f0e6ff}
.popup-opt:last-child{border-bottom:none}
.popup-opt:hover{background:var(--accent-light)}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:50}

/* Actions row */
.s-actions{display:flex;align-items:center;gap:10px;margin-top:12px;flex-wrap:wrap}
.check-btn{padding:10px 28px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--accent-dark));color:#fff;font-size:.95rem;font-weight:600;cursor:pointer;box-shadow:0 3px 12px rgba(139,92,246,.3);transition:transform .15s,box-shadow .15s,opacity .2s}
.check-btn:hover{transform:translateY(-1px);box-shadow:0 5px 16px rgba(139,92,246,.4)}
.check-btn:active{transform:translateY(0)}
.check-btn:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none}
.hint-btn{width:36px;height:36px;border:2px solid var(--accent);border-radius:50%;background:transparent;color:var(--accent);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s,color .2s;flex-shrink:0}
.hint-btn:hover{background:var(--accent);color:#fff}
.hint-btn.active{background:var(--accent);color:#fff}

/* Translation */
.translation{margin-top:8px;padding:8px 14px;background:var(--accent-light);border-radius:10px;color:var(--accent-dark);font-size:.9rem;display:none;animation:fadeIn .25s ease-out}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* Correction hint */
.correction{font-size:.78rem;color:var(--bad);font-weight:500;display:block;margin-top:2px}

/* Result */
.result-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:28px;text-align:center;margin:24px 0;display:none;animation:fadeIn .4s ease-out}
.result-card h2{font-size:1.4rem;margin-bottom:8px}
.result-card p{color:var(--muted);font-size:1rem}
.score{font-size:2.4rem;font-weight:800;color:var(--accent);margin:12px 0}

/* Progress */
.progress-bar{width:100%;height:6px;background:var(--accent-light);border-radius:3px;margin-bottom:20px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-dark));border-radius:3px;transition:width .4s ease;width:0%}

/* Confetti canvas */
#confettiCanvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}

/* Mobile */
@media(max-width:480px){
  .s-card{padding:16px 14px}
  .s-text{font-size:1rem}
  .blank{min-width:70px;padding:3px 10px;font-size:.92rem}
  .check-btn{padding:9px 20px;font-size:.88rem}
}
</style>
</head>

const DATA = [{"num": 1, "parts": ["Anahtarları kutunun ", " koydum."], "blanks": [{"correct": "içine", "options": ["içine", "içini"]}], "translation": "Я положил ключи в коробку."}, {"num": 2, "parts": ["Senin ", " ", " biliyorum, beni kandıramazsın."], "blanks": [{"correct": "içini", "options": ["içini", "içine"]}, {"correct": "dışını", "options": ["dışını", "dışına"]}], "translation": "Я знаю тебя, как облупленного, меня ты не обманешь."}, {"num": 3, "parts": ["", " bakmadan yürüyor."], "blanks": [{"correct": "Arkasına", "options": ["Arkasına", "Arkasını"]}], "translation": "Он идет, не оборачиваясь."}, {"num": 4, "parts": ["Okulun ", " hiç bu kadar kalabalık görmedim."], "blanks": [{"correct": "önünü", "options": ["önünü", "önüne"]}], "translation": "Никогда еще не видел такую толпу перед школой."}, {"num": 5, "parts": ["Arabayı dükkanın ", " bıraktım."], "blanks": [{"correct": "karşısına", "options": ["karşısına", "karşısını"]}], "translation": "Я оставил машину напротив магазина."}, {"num": 6, "parts": ["Balığı pişirmeden önce hem ", " hem ", " iyice yıkayın."], "blanks": [{"correct": "içini", "options": ["içini", "içine"]}, {"correct": "dışını", "options": ["dışını", "dışına"]}], "translation": "Перед тем, как готовить рыбу, хорошенько помойте ее как снаружи, так и внутри."}, {"num": 7, "parts": ["Ben arabanın hem ", ", hem de ", " çok beğendim."], "blanks": [{"correct": "içini", "options": ["içini", "içine"]}, {"correct": "dışını", "options": ["dışını", "dışına"]}], "translation": "Мне машина очень сильно понравилась, как снаружи, так и внутри."}, {"num": 8, "parts": ["Git ", " giy, seni okula bırakacağım."], "blanks": [{"correct": "üstünü", "options": ["üstünü", "üstüne"]}], "translation": "Иди, одевайся, я отвезу тебя в школу."}, {"num": 9, "parts": ["Oda çok serin, neden ", " bir şey giymiyorsun?"], "blanks": [{"correct": "üstüne", "options": ["üstüne", "üstünü"]}], "translation": "В комнате очень прохладно, почему бы тебе не надеть что-нибудь?"}, {"num": 10, "parts": ["Polis hırsızın ", " aradı ama kayda değer herhangi bir şey bulmadı."], "blanks": [{"correct": "üstünü", "options": ["üstünü", "üstüne"]}], "translation": "Полиция его обыскала, но не нашла ничего существенного."}, {"num": 11, "parts": ["Yemeği bir saat sonra yiyecekmiş. Soğumasın diye ", " kapattım."], "blanks": [{"correct": "üstünü", "options": ["üstünü", "üstüne"]}], "translation": "Он говорит, что поест через час. Я прикрыла еду, чтобы она не остыла."}, {"num": 12, "parts": ["", " katılmak için ne yapmalıyım?"], "blanks": [{"correct": "Aranıza", "options": ["Aranıza", "Aranızı"]}], "translation": "Что я должен делать, чтобы присоединиться к вам?"}, {"num": 13, "parts": ["", " hoş geldiniz!"], "blanks": [{"correct": "Aramıza", "options": ["Aramıza", "Aramızı"]}], "translation": "Добро пожаловать в наши ряды!"}, {"num": 14, "parts": ["", " bozmalarına izin vermeyiz."], "blanks": [{"correct": "Aramızı", "options": ["Aramızı", "Aramıza"]}], "translation": "Мы не позволим им рассорить нас."}, {"num": 15, "parts": ["Yatmadan önce peluş ayıcığını yastığının ", " koyar."], "blanks": [{"correct": "yanına", "options": ["yanına", "yanını"]}], "translation": "Перед тем, как заснуть, она кладет своего плюшевого мишку рядом с подушкой."}, {"num": 16, "parts": ["Evin ", " dolaştık."], "blanks": [{"correct": "etrafını", "options": ["etrafını", "etrafına"]}], "translation": "Мы обошли дом вокруг."}, {"num": 17, "parts": ["Göletin ", " gezdik."], "blanks": [{"correct": "etrafını", "options": ["etrafını", "etrafına"]}], "translation": "Мы прогулялись вокруг пруда."}, {"num": 18, "parts": ["Yatağın ", " düzelttim."], "blanks": [{"correct": "üstünü", "options": ["üstünü", "üstüne"]}], "translation": "Я поправил постель."}, {"num": 19, "parts": ["Battaniyeyi yatağın ", " serdim."], "blanks": [{"correct": "üstüne", "options": ["üstüne", "üstünü"]}], "translation": "Я расстелил одеяло на кровати."}, {"num": 20, "parts": ["Top masanın ", " kaçtı."], "blanks": [{"correct": "altına", "options": ["altına", "altını"]}], "translation": "Мяч закатился под стол."}];
const totalSentences = DATA.length;
let answers = {};   // answers[sentenceIdx][blankIdx] = chosen value
let checkedSet = new Set();
let correctCount = 0;

function shuffle(a) {
  let b = [...a];
  for (let i = b.length - 1; i > 0; i--) {
    let j = Math.floor(Math.random() * (i + 1));
    [b[i], b[j]] = [b[j], b[i]];
  }
  return b;
}

function render() {
  const el = document.getElementById('quiz');
  let html = '';
  DATA.forEach((s, si) => {
    html += '<div class="s-card" id="card' + si + '">';
    html += '<div style="display:flex;align-items:flex-start;gap:0">';
    html += '<span class="s-num">' + s.num + '</span>';
    html += '<span class="s-text">';
    s.parts.forEach((part, pi) => {
      html += part;
      if (pi < s.blanks.length) {
        html += '<span class="blank" id="b' + si + '_' + pi + '" onclick="showPopup(' + si + ',' + pi + ')">______</span>';
      }
    });
    html += '</span></div>';
    html += '<div class="s-actions">';
    html += '<button class="hint-btn" id="hint' + si + '" onclick="toggleHint(' + si + ')" title="Показать перевод">💡</button>';
    html += '<button class="check-btn" id="chk' + si + '" onclick="checkSentence(' + si + ')">Проверить</button>';
    html += '</div>';
    html += '<div class="translation" id="tr' + si + '">' + s.translation + '</div>';
    html += '</div>';
  });
  el.innerHTML = html;
}

function showPopup(si, bi) {
  if (checkedSet.has(si)) return;
  closePopups();
  const blank = document.getElementById('b' + si + '_' + bi);
  const blankData = DATA[si].blanks[bi];
  const opts = shuffle(blankData.options);
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.onclick = closePopups;
  document.body.appendChild(overlay);
  const popup = document.createElement('div');
  popup.className = 'popup';
  opts.forEach(o => {
    const d = document.createElement('div');
    d.className = 'popup-opt';
    d.textContent = o;
    d.onclick = function(e) { e.stopPropagation(); selectOpt(si, bi, o); };
    popup.appendChild(d);
  });
  blank.appendChild(popup);
}

function closePopups() {
  document.querySelectorAll('.popup').forEach(p => p.remove());
  document.querySelectorAll('.overlay').forEach(o => o.remove());
}

function selectOpt(si, bi, val) {
  closePopups();
  if (!answers[si]) answers[si] = {};
  answers[si][bi] = val;
  const blank = document.getElementById('b' + si + '_' + bi);
  blank.textContent = val;
  blank.classList.add('filled');
}

function toggleHint(si) {
  const tr = document.getElementById('tr' + si);
  const btn = document.getElementById('hint' + si);
  if (tr.style.display === 'block') {
    tr.style.display = 'none';
    btn.classList.remove('active');
  } else {
    tr.style.display = 'block';
    btn.classList.add('active');
  }
}

function checkSentence(si) {
  if (checkedSet.has(si)) return;
  const s = DATA[si];
  const ans = answers[si] || {};
  // Check if all blanks filled
  let allFilled = true;
  for (let bi = 0; bi < s.blanks.length; bi++) {
    if (ans[bi] === undefined) { allFilled = false; break; }
  }
  if (!allFilled) {
    // Shake the card briefly
    const card = document.getElementById('card' + si);
    card.style.animation = 'none';
    card.offsetHeight;
    card.style.animation = 'shake .3s ease';
    setTimeout(() => card.style.animation = '', 400);
    return;
  }
  checkedSet.add(si);
  let allCorrect = true;
  for (let bi = 0; bi < s.blanks.length; bi++) {
    const blank = document.getElementById('b' + si + '_' + bi);
    const chosen = ans[bi];
    const correct = s.blanks[bi].correct;
    if (chosen.toLowerCase() === correct.toLowerCase()) {
      blank.classList.add('correct');
    } else {
      blank.classList.add('wrong');
      allCorrect = false;
      const corr = document.createElement('span');
      corr.className = 'correction';
      corr.textContent = '→ ' + correct;
      blank.appendChild(corr);
    }
    blank.classList.add('locked');
  }
  const card = document.getElementById('card' + si);
  card.classList.add(allCorrect ? 'checked-ok' : 'checked-bad');
  if (allCorrect) correctCount++;
  document.getElementById('chk' + si).disabled = true;
  // Update progress
  const pct = (checkedSet.size / totalSentences) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  // Check if all done
  if (checkedSet.size === totalSentences) {
    showResult();
  }
}

function showResult() {
  const res = document.getElementById('result');
  const pct = correctCount / totalSentences;
  document.getElementById('scoreText').textContent = correctCount + ' / ' + totalSentences;
  if (pct >= 0.9) {
    document.getElementById('resultTitle').textContent = '🎉 Отлично!';
    document.getElementById('resultMsg').textContent = 'Ты прекрасно разбираешься в послелогах!';
    document.getElementById('scoreText').style.color = '#22c55e';
    launchConfetti();
    playSound();
  } else if (pct >= 0.6) {
    document.getElementById('resultTitle').textContent = '💪 Хороший результат!';
    document.getElementById('resultMsg').textContent = 'Ещё чуть-чуть — и будет идеально!';
    document.getElementById('scoreText').style.color = '#8b5cf6';
  } else {
    document.getElementById('resultTitle').textContent = '📚 Есть куда расти!';
    document.getElementById('resultMsg').textContent = 'Повтори тему и попробуй ещё раз!';
    document.getElementById('scoreText').style.color = '#ef4444';
  }
  res.style.display = 'block';
  res.scrollIntoView({behavior: 'smooth'});
}

/* ---- Confetti ---- */
function launchConfetti() {
  const canvas = document.getElementById('confettiCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const colors = ['#8b5cf6','#a78bfa','#c4b5fd','#22c55e','#fbbf24','#f472b6','#60a5fa','#34d399'];
  const pieces = [];
  for (let i = 0; i < 150; i++) {
    pieces.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height - canvas.height,
      w: Math.random() * 10 + 5,
      h: Math.random() * 6 + 3,
      color: colors[Math.floor(Math.random() * colors.length)],
      vy: Math.random() * 3 + 2,
      vx: (Math.random() - 0.5) * 2,
      rot: Math.random() * 360,
      vr: (Math.random() - 0.5) * 8
    });
  }
  let frames = 0;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot * Math.PI / 180);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      ctx.restore();
      p.y += p.vy;
      p.x += p.vx;
      p.rot += p.vr;
      p.vy += 0.04;
    });
    frames++;
    if (frames < 200) requestAnimationFrame(draw);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
  draw();
}

/* ---- Sound ---- */
function playSound() {
  try {
    const ac = new (window.AudioContext || window.webkitAudioContext)();
    const notes = [523.25, 659.25, 783.99, 1046.5];
    notes.forEach((freq, i) => {
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.15, ac.currentTime + i * 0.15);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + i * 0.15 + 0.5);
      osc.connect(gain);
      gain.connect(ac.destination);
      osc.start(ac.currentTime + i * 0.15);
      osc.stop(ac.currentTime + i * 0.15 + 0.5);
    });
  } catch(e) {}
}

/* ---- Shake animation (inline) ---- */
const shakeStyle = document.createElement('style');
shakeStyle.textContent = '@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}';
document.head.appendChild(shakeStyle);

render();
</script>
</body>
</html>
