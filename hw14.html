<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Тест: Винительный падеж</title>
<style>
:root {
  --bg: #f5f0ff;
  --card: #ffffff;
  --text: #1f1833;
  --muted: #7c6f93;
  --accent: #8b5cf6;
  --accent-dark: #7c3aed;
  --accent-light: #ede9fe;
  --ok: #22c55e;
  --ok-bg: #dcfce7;
  --bad: #ef4444;
  --bad-bg: #fee2e2;
  --field: #f3e8ff;
  --shadow: 0 2px 12px rgba(139,92,246,.12);
  --radius: 16px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);min-height:100vh;padding:16px;color:var(--text)}
.container{max-width:760px;margin:0 auto}
.hero-img{width:100%;max-height:280px;object-fit:cover;border-radius:var(--radius);margin-bottom:20px;box-shadow:var(--shadow)}
.header{text-align:center;margin-bottom:24px}
.header h1{font-size:1.6rem;color:var(--accent-dark);margin-bottom:8px;line-height:1.2}
.header .sub{font-size:.95rem;font-weight:400;color:var(--muted)}
.header p{color:var(--muted);font-size:.95rem;line-height:1.5;max-width:600px;margin:8px auto 0}
.text-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px 28px;margin-bottom:20px;font-size:1.1rem;line-height:2.2}
.blank{display:inline-block;min-width:90px;padding:4px 14px;margin:2px 4px;border-radius:10px;background:var(--field);border:2px dashed var(--accent);cursor:pointer;text-align:center;font-weight:600;color:var(--accent);transition:all .2s;position:relative;font-size:1rem;vertical-align:middle}
.blank:hover{background:var(--accent-light);border-color:var(--accent-dark)}
.blank.filled{border-style:solid;background:var(--accent-light);color:var(--accent-dark)}
.blank.correct{border-color:var(--ok)!important;background:var(--ok-bg)!important;color:#166534!important;cursor:default}
.blank.wrong{border-color:var(--bad)!important;background:var(--bad-bg)!important;color:#991b1b!important;cursor:default}
.popup{position:absolute;top:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--card);border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,.18);z-index:100;overflow:hidden;min-width:160px;animation:popIn .15s ease-out}
@keyframes popIn{from{opacity:0;transform:translateX(-50%) translateY(-6px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.popup-opt{padding:12px 20px;cursor:pointer;font-size:1rem;font-weight:500;transition:background .1s;text-align:center;border-bottom:1px solid #f0e6ff}
.popup-opt:last-child{border-bottom:none}
.popup-opt:hover{background:var(--accent-light)}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:50}
.check-btn{display:block;width:100%;max-width:320px;margin:28px auto;padding:16px;border:none;border-radius:var(--radius);background:linear-gradient(135deg,var(--accent),var(--accent-dark));color:#fff;font-size:1.1rem;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(139,92,246,.35);transition:transform .15s,box-shadow .15s}
.check-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(139,92,246,.45)}
.check-btn:active{transform:translateY(0)}
.check-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.result-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:28px;text-align:center;margin:20px 0;display:none}
.result-card h2{font-size:1.4rem;margin-bottom:8px}
.result-card p{color:var(--muted);font-size:1.05rem}
.score{font-size:2.4rem;font-weight:800;color:var(--accent);margin:12px 0}
.correction{font-size:.8rem;color:var(--bad);font-weight:500;margin-top:2px;display:block}
</style>
</head>

const Q = [{"id": 0, "before": "", "after": " çok az kaldı ve gerçekten çok heyecanlıyım.", "correct": "Düğünüme", "options": ["Düğünüme", "Düğünümü"]}, {"id": 1, "before": "Kafam çok karışık. ", "after": " iyice planlamam lazım. ", "correct": "Her şeyi", "options": ["Her şeyi", "Her şey"]}, {"id": 2, "before": "Önce ", "after": " düşündüm.", "correct": "salonu", "options": ["salonu", "salon"]}, {"id": 3, "before": "Güzel bir ", "after": " buldum ama ", "correct": "salon", "options": ["salon", "salonu"]}, {"id": 4, "before": "", "after": " biraz daha süslemek istiyorum. ", "correct": "salonu", "options": ["salonu", "salon"]}, {"id": 5, "before": "", "after": " nasıl hazırlayacağımı henüz tam bilmiyorum. ", "correct": "Masaları", "options": ["Masaları", "Masalar"]}, {"id": 6, "before": "", "after": " kullanmak istiyorum. ", "correct": "Beyaz çiçekleri", "options": ["Beyaz çiçekleri", "Beyaz çiçekler"]}, {"id": 7, "before": "Hangi ", "after": " almalıyım acaba? ", "correct": "çiçekleri", "options": ["çiçekleri", "çiçekler"]}, {"id": 8, "before": "", "after": " sade yapmak istiyorum çünkü abartılı şeyleri sevmiyorum. ", "correct": "Dekorasyonu", "options": ["Dekorasyonu", "Dekorasyon"]}, {"id": 9, "before": "Ama yine de bazı ", "after": "", "correct": "detayları", "options": ["detayları", "detaylar"]}, {"id": 10, "before": "", "after": " çok istiyorum. ", "correct": "planlamayı", "options": ["planlamayı", "planlamak"]}, {"id": 11, "before": "", "after": " de zor bir konu. ", "correct": "Misafir listesi", "options": ["Misafir listesi", "Misafir listesini"]}, {"id": 12, "before": "Kimleri davet ", "after": " düşündükçe stres oluyorum. ", "correct": "edeceğimi", "options": ["edeceğimi", "edeceğim"]}, {"id": 13, "before": "Bazı ", "after": " çağırmak istiyorum ama ", "correct": "insanları", "options": ["insanları", "insanlar"]}, {"id": 14, "before": "", "after": " konusunda pek emin değilim. ", "correct": "bazıları", "options": ["bazıları", "bazılarını"]}, {"id": 15, "before": "Annem yardım etmek ", "after": " söylüyor ama ben ", "correct": "istediğini", "options": ["istediğini", "istediği"]}, {"id": 16, "before": "", "after": " kendim planlamak istiyorum. ", "correct": "düğünümü", "options": ["düğünümü", "düğünüm"]}, {"id": 17, "before": "Arkadaşlarımın bana ", "after": " edeceğini biliyorum. ", "correct": "yardım", "options": ["yardım", "yardımı"]}, {"id": 18, "before": "Müzik de önemli. Güzel bir ", "after": " seçmek istiyorum. ", "correct": "şarkı", "options": ["şarkı", "şarkıyı"]}, {"id": 19, "before": "İlk dansımız için özel bir ", "after": " çoktan buldum. ", "correct": "şarkıyı", "options": ["şarkıyı", "şarkı"]}, {"id": 20, "before": "Bazen her şeyin çok zor ", "after": " düşünüyorum ama ", "correct": "olduğunu", "options": ["olduğunu", "olduğu"]}, {"id": 21, "before": "bu günün çok güzel ", "after": " inanıyorum.", "correct": "geçeceğine", "options": ["geçeceğine", "geçeceğini"]}];
let answers = {};
let checked = false;

function shuffle(a) {
  let b = [...a];
  for (let i = b.length - 1; i > 0; i--) {
    let j = Math.floor(Math.random() * (i + 1));
    [b[i], b[j]] = [b[j], b[i]];
  }
  return b;
}

function render() {
  const el = document.getElementById('quiz');
  let html = '';
  Q.forEach((q, i) => {
    if (q.before) html += q.before;
    html += '<span class="blank" id="b' + i + '" onclick="showPopup(' + i + ')" data-correct="' + q.correct + '">______</span>';
    if (q.after) html += q.after;
  });
  el.innerHTML = html;
}

function showPopup(i) {
  if (checked) return;
  closePopups();
  const blank = document.getElementById('b' + i);
  const q = Q[i];
  const opts = shuffle(q.options);
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.onclick = closePopups;
  document.body.appendChild(overlay);
  const popup = document.createElement('div');
  popup.className = 'popup';
  opts.forEach(o => {
    const d = document.createElement('div');
    d.className = 'popup-opt';
    d.textContent = o;
    d.onclick = function(e) { e.stopPropagation(); selectOpt(i, o); };
    popup.appendChild(d);
  });
  blank.appendChild(popup);
}

function closePopups() {
  document.querySelectorAll('.popup').forEach(p => p.remove());
  document.querySelectorAll('.overlay').forEach(o => o.remove());
}

function selectOpt(i, val) {
  closePopups();
  answers[i] = val;
  const blank = document.getElementById('b' + i);
  blank.textContent = val;
  blank.classList.add('filled');
  blank.onclick = function() { showPopup(i); };
}

function checkAll() {
  if (checked) return;
  checked = true;
  let correct = 0;
  Q.forEach((q, i) => {
    const blank = document.getElementById('b' + i);
    const ans = answers[i];
    if (ans === q.correct) {
      blank.classList.add('correct');
      correct++;
    } else {
      blank.classList.add('wrong');
      if (!ans) blank.textContent = '?';
      const corr = document.createElement('span');
      corr.className = 'correction';
      corr.textContent = '\u2192 ' + q.correct;
      blank.appendChild(corr);
    }
    blank.style.cursor = 'default';
    blank.onclick = null;
  });
  const pct = correct / Q.length;
  const res = document.getElementById('result');
  document.getElementById('scoreText').textContent = correct + ' / ' + Q.length;
  if (pct >= 0.9) {
    document.getElementById('resultTitle').textContent = '\uD83C\uDF89 Отлично!';
    document.getElementById('resultMsg').textContent = 'Вы прекрасно разбираетесь в винительном падеже!';
    document.getElementById('scoreText').style.color = '#22c55e';
  } else if (pct >= 0.6) {
    document.getElementById('resultTitle').textContent = '\uD83D\uDCAA Хороший результат!';
    document.getElementById('resultMsg').textContent = 'Немного подтянете \u2014 и будет идеально!';
    document.getElementById('scoreText').style.color = '#8b5cf6';
  } else {
    document.getElementById('resultTitle').textContent = '\uD83D\uDCDA Есть куда расти!';
    document.getElementById('resultMsg').textContent = 'Интенсив вам точно пригодится!';
    document.getElementById('scoreText').style.color = '#ef4444';
  }
  res.style.display = 'block';
  document.getElementById('checkBtn').disabled = true;
  res.scrollIntoView({behavior: 'smooth'});
}

render();
</script>
</body>
</html>
