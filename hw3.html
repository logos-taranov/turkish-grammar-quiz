<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Упражнение 3 — Аудирование (изафетные цепочки)</title>
  <style>
    :root{
      --bg:#e3f2fd;
      --card:#ffffff;
      --text:#1f2937;
      --muted:#6b7280;
      --accent:#3478E0;
      --accent-dark:#1f5fc8;
      --ok:#4CAF50;
      --bad:#f44336;
      --field:#f5f9ff;
      --shadow:0 2px 10px rgba(0,0,0,.08);
      --radius:14px;
    }

    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
      background:var(--bg);
      min-height:100vh;
      padding:16px;
      color:var(--text);
    }

    .container{max-width:860px;margin:0 auto}
    .header{text-align:center;margin:8px 0 14px}
    .header h1{font-size:1.6rem;line-height:1.15;color:var(--accent);margin-bottom:6px}

    .instructions{
      background:var(--card);
      border-radius:var(--radius);
      padding:14px 16px;
      box-shadow:var(--shadow);
      font-size:.95rem;
      line-height:1.45;
      color:#374151;
      margin-bottom:12px;
    }
    .instructions strong{color:var(--accent)}

    .audioCard{
      background:var(--card);
      border-radius:var(--radius);
      padding:12px 14px;
      box-shadow:var(--shadow);
      margin-bottom:14px;
    }
    .audioCard .label{font-weight:700;color:#111827;margin-bottom:8px}
    audio{width:100%}

    .list{display:flex;flex-direction:column;gap:12px;margin-bottom:14px}
    .item{
      background:var(--card);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:14px;
      border:2px solid transparent;
      transition:border-color .15s ease, background .15s ease;
    }
    .item.correct{border-color:rgba(76,175,80,.55);background:#e8f5e9}
    .item.incorrect{border-color:rgba(244,67,54,.55);background:#ffebee}

    .row{
      display:grid;
      grid-template-columns: 34px 1fr;
      gap:10px;
      align-items:start;
    }

    .num{
      width:34px;height:34px;
      display:flex;align-items:center;justify-content:center;
      border-radius:10px;
      background:rgba(52,120,224,.12);
      color:var(--accent);
      font-weight:800;
    }

    .prompt{font-weight:700;color:var(--accent);font-size:1.02rem;line-height:1.25;margin-top:6px}

    .answerWrap{margin-top:10px}

    .answerInput{
      width:100%;
      border:2px solid #bbdefb;
      background:var(--field);
      color:var(--text);
      border-radius:12px;
      padding:10px 12px;
      font-size:1.05rem;
      line-height:1.25;
      outline:none;
      min-height:46px;
      resize:none;
      overflow:hidden;
      transition:border-color .15s ease, box-shadow .15s ease, background .15s ease;
    }
    .answerInput:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(52,120,224,.14)}

    .answerInput.good{border-color:rgba(76,175,80,.9);background:#ffffff}
    .answerInput.bad{border-color:rgba(244,67,54,.9);background:#ffffff}

    .hint{
      display:none;
      margin-top:8px;
      font-size:.95rem;
      color:#991b1b;
      background:rgba(244,67,54,.08);
      border:1px solid rgba(244,67,54,.35);
      border-radius:12px;
      padding:8px 10px;
      line-height:1.35;
    }
    .hint.show{display:block}

    .footerCard{
      background:var(--card);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:14px;
    }

    .actions{display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:space-between}

    .checkBtn{
      border:none;
      background:var(--accent);
      color:#fff;
      padding:12px 18px;
      border-radius:12px;
      cursor:pointer;
      font-size:1rem;
      font-weight:800;
      transition:background .15s ease, transform .05s ease;
    }
    .checkBtn:hover{background:var(--accent-dark)}
    .checkBtn:active{transform:translateY(1px)}

    .resetBtn{
      border:none;
      background:rgba(52,120,224,.12);
      color:var(--accent);
      padding:12px 18px;
      border-radius:12px;
      cursor:pointer;
      font-size:1rem;
      font-weight:800;
      transition:background .15s ease, transform .05s ease;
    }
    .resetBtn:hover{background:rgba(52,120,224,.18)}
    .resetBtn:active{transform:translateY(1px)}

    .score{
      font-size:1rem;
      color:#111827;
      font-weight:800;
    }
    .score small{display:block;font-weight:500;color:var(--muted);margin-top:2px}

    .message{
      display:none;
      margin-top:12px;
      padding:14px;
      border-radius:14px;
      background:#f3f6ff;
      border:1px solid rgba(52,120,224,.25);
      color:#1f2937;
      line-height:1.45;
    }
    .message.show{display:block}
    .message .title{font-weight:900;color:var(--accent);margin-bottom:6px}

    @media (max-width: 640px){
      body{padding:12px}
      .actions{flex-direction:column;align-items:stretch}
      .checkBtn,.resetBtn{width:100%}
      .score{text-align:center}
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Упражнение 3</h1>
    </div>

    <div class="instructions">
      <strong>Прослушайте диалог несколько раз и переведите словосочетания.</strong>
      Притяжательные местоимения (benim, sizin) указывать не нужно.
    </div>

    <div class="audioCard">
      <div class="label">Аудио</div>
      <audio controls preload="none" src="audio/hw3_dialog.mp3"></audio>
    </div>

    <div class="list" id="list"></div>

    <div class="footerCard">
      <div class="actions">
        <button class="checkBtn" id="checkBtn" type="button">Проверить</button>
        <button class="resetBtn" id="resetBtn" type="button">Tekrar Dene</button>
        <div class="score" id="score">0 / 6 doğru<small>Можно проверять сколько угодно раз.</small></div>
      </div>
      <div class="message" id="message">
        <div class="title" id="messageTitle"></div>
        <div id="messageBody"></div>
      </div>
    </div>
  </div>

  <script>
    const DATA = [
      {
        ru: 'поведение жены друга моего друга',
        answers: ['arkadaşımın arkadaşının davranışı'],
      },
      {
        ru: 'место работы жены вашего друга',
        answers: ['arkadaşınızın arkadaşının karısının iş yeri'],
      },
      {
        ru: 'телефон жены моего друга',
        answers: ['arkadaşımın arkadaşının telefonu'],
      },
      {
        ru: 'проблема друга моего друга',
        answers: ['arkadaşımın arkadaşının sorunu', 'arkadaşımın arkadaşının problemi'],
      },
      {
        ru: 'коллеги жены друга моего друга',
        answers: ['arkadaşımın arkadaşının iş arkadaşları'],
      },
      {
        ru: 'ежедневная программа жены друга вашего друга',
        answers: ['arkadaşınızın arkadaşının karısının günlük programı'],
      },
    ];

    const state = {
      wasCorrect: Array(DATA.length).fill(false),
      audioCtx: null,
    };

    function ensureAudio(){
      if(!state.audioCtx){
        state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if(state.audioCtx.state === 'suspended') state.audioCtx.resume();
    }

    function beep(freq=880, dur=0.08){
      ensureAudio();
      const ctx = state.audioCtx;
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'sine';
      o.frequency.value = freq;
      g.gain.setValueAtTime(0.0001, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.12, ctx.currentTime + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + dur);
      o.connect(g);
      g.connect(ctx.destination);
      o.start();
      o.stop(ctx.currentTime + dur);
    }

    function playCorrect(){
      // как в hw2: короткая двухнота
      beep(659, 0.08);
      setTimeout(() => beep(880, 0.10), 90);
    }

    function norm(s){
      return (s ?? '')
        .toString()
        .trim()
        .replace(/\s+/g,' ')
        .toLocaleLowerCase('tr-TR');
    }

    function escapeHtml(s){
      return (s ?? '').toString()
        .replaceAll('&','&amp;')
        .replaceAll('<','&lt;')
        .replaceAll('>','&gt;')
        .replaceAll('"','&quot;')
        .replaceAll("'",'&#39;');
    }

    function autosizeTA(ta){
      ta.style.height = 'auto';
      ta.style.height = (ta.scrollHeight) + 'px';
    }

    function render(){
      const list = document.getElementById('list');
      list.innerHTML = '';

      DATA.forEach((it, idx) => {
        const card = document.createElement('div');
        card.className = 'item';
        card.id = 'item-' + idx;

        const row = document.createElement('div');
        row.className = 'row';

        const num = document.createElement('div');
        num.className = 'num';
        num.textContent = (idx + 1);

        const right = document.createElement('div');

        const prompt = document.createElement('div');
        prompt.className = 'prompt';
        prompt.textContent = it.ru;

        const answerWrap = document.createElement('div');
        answerWrap.className = 'answerWrap';

        const ta = document.createElement('textarea');
        ta.className = 'answerInput';
        ta.id = 'ans-' + idx;
        ta.rows = 1;
        ta.placeholder = 'Введите перевод по-турецки…';
        ta.autocomplete = 'off';
        ta.spellcheck = false;
        ta.setAttribute('aria-label', 'Ответ');

        ta.addEventListener('input', () => autosizeTA(ta));
        ta.addEventListener('focus', () => autosizeTA(ta));
        ta.addEventListener('keydown', (e) => {
          if(e.key === 'Enter' && (e.ctrlKey || e.metaKey)){
            e.preventDefault();
            checkAll();
          }
        });

        const hint = document.createElement('div');
        hint.className = 'hint';
        hint.id = 'hint-' + idx;

        answerWrap.appendChild(ta);
        answerWrap.appendChild(hint);

        right.appendChild(prompt);
        right.appendChild(answerWrap);

        row.appendChild(num);
        row.appendChild(right);

        card.appendChild(row);
        list.appendChild(card);

        // initial size
        requestAnimationFrame(() => autosizeTA(ta));
      });
    }

    function setMessage(score){
      const box = document.getElementById('message');
      const title = document.getElementById('messageTitle');
      const body = document.getElementById('messageBody');

      if(score === DATA.length){
        title.textContent = 'Отлично!';
        body.textContent = 'Вау, да вы уже почти ас в изафетных цепочках!';
        box.classList.add('show');
      } else if(score >= 4){
        title.textContent = 'Очень хорошо!';
        body.textContent = 'Очень хороший результат! Похоже, вы уже начинаете чувствовать логику изафетных цепочек. Продолжайте — до мастерства осталось совсем немного!';
        box.classList.add('show');
      } else {
        title.textContent = 'Ещё чуть-чуть';
        body.textContent = 'Ничего страшного — попробуйте ещё раз: переслушайте диалог и проверьте цепочки по частям (кто чей/чья/чьё).';
        box.classList.add('show');
      }
    }

    function clearMessage(){
      const box = document.getElementById('message');
      box.classList.remove('show');
      document.getElementById('messageTitle').textContent = '';
      document.getElementById('messageBody').textContent = '';
    }

    function markTA(ta, ok){
      ta.classList.remove('good','bad');
      ta.classList.add(ok ? 'good' : 'bad');
    }

    function setHint(idx, show, answers){
      const el = document.getElementById('hint-' + idx);
      el.classList.toggle('show', !!show);
      if(show){
        el.innerHTML = '<strong>Правильно:</strong> ' + answers.map(a => escapeHtml(a)).join(' / ');
      } else {
        el.innerHTML = '';
      }
    }

    function checkAll(){
      ensureAudio();

      let score = 0;

      DATA.forEach((it, idx) => {
        const card = document.getElementById('item-' + idx);
        const ta = document.getElementById('ans-' + idx);

        const v = norm(ta.value);
        const ok = it.answers.some(a => norm(a) === v);

        markTA(ta, ok);
        setHint(idx, !ok, it.answers);

        card.classList.remove('correct','incorrect');
        card.classList.add(ok ? 'correct' : 'incorrect');

        if(ok){
          score++;
          if(!state.wasCorrect[idx]){
            playCorrect();
          }
          state.wasCorrect[idx] = true;
        } else {
          state.wasCorrect[idx] = false;
        }
      });

      document.getElementById('score').firstChild.nodeValue = `${score} / ${DATA.length} doğru`;
      setMessage(score);
      document.getElementById('message').scrollIntoView({behavior:'smooth', block:'nearest'});
    }

    function resetAll(){
      state.wasCorrect = Array(DATA.length).fill(false);

      DATA.forEach((_, idx) => {
        const card = document.getElementById('item-' + idx);
        const ta = document.getElementById('ans-' + idx);
        ta.value = '';
        ta.classList.remove('good','bad');
        autosizeTA(ta);
        card.classList.remove('correct','incorrect');
        setHint(idx, false, []);
      });

      document.getElementById('score').firstChild.nodeValue = `0 / ${DATA.length} doğru`;
      clearMessage();
      window.scrollTo({top:0, behavior:'smooth'});
    }

    render();

    document.getElementById('checkBtn').addEventListener('click', checkAll);
    document.getElementById('resetBtn').addEventListener('click', resetAll);

    // Разрешаем "пробуждение" аудио контекста на любое взаимодействие
    ['pointerdown','touchstart','keydown'].forEach(evt => {
      window.addEventListener(evt, () => { try{ ensureAudio(); }catch(e){} }, {once:true, passive:true});
    });
  </script>
</body>
</html>
